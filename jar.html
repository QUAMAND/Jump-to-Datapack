<!DOCTYPE html>
<html lang="ko">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>JAR downloads</title>
   <link rel="icon" href="assets/icon-jar.png"/>
   <link rel="stylesheet" href="style.css"/>
   <link rel="stylesheet" href="jar.css"/>
</head>

<body>
   <!-- 모바일 상단 바 -->
   <div id="TOPBAR">
      <div id="TITLE_GROUP">
         <img id="ICON" src="assets/icon.png"/>
         <span class="TOP_TITLE" id="HOME_BTN">JAR downloads</span>
      </div>
      <div id="MORE_BTN">
         <svg viewBox="0 0 8 8" width="24" height="24" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">
            <g fill="currentColor">
               <rect x="3" y="1" width="1" height="1"/>
               <rect x="4" y="1" width="1" height="1"/>
               <rect x="2" y="2" width="1" height="1"/>
               <rect x="5" y="2" width="1" height="1"/>
               <rect x="1" y="3" width="1" height="1"/>
               <rect x="6" y="3" width="1" height="1"/>
               <rect x="0" y="4" width="1" height="1"/>
               <rect x="7" y="4" width="1" height="1"/>
            </g>
         </svg>
      </div>
      <div id="MORE_LIST">
         <a href="/#1">Jump to Datapack</a>
      </div>
   </div>

   <div class="APP">
      <!-- <footer id="FOOTER">
         <a href="https://www.dafont.com/minecrafter.font" target="_blank">Font: MineCrafter by PurePixel / MadPixel — Creative Commons Non-Commercial</a>
      </footer> -->
      <!-- 상단 블록: JAR downloads -->
      <div id="JAR_SEARCH">
         <h2>Jar 다운로드</h2>

         <!-- 종류 선택 -->
         <div>
            <label for="JAR_TYPE">Jar 종류</label>
            <select id="JAR_TYPE" class="JQL_INPUT">
               <option value="CLIENT">client</option>
               <option value="SERVER">server</option>
               <option value="BOTH">both</option>
            </select>
         </div>

         <!-- 버전 선택기 -->
         <div class="VERSIONS">
            <label for="VERSION">버전</label>
            <input type="text" id="VERSION" class="JQL_INPUT" placeholder="버전 입력 또는 선택..."
               autocomplete="off" />
            <ul id="VERSION_LIST"></ul>
            <button id="DOWNLOADS">다운로드</button>
         </div>
      </div>
      </main>
   </div>
   <script src="all.js"></script>
   <script src="jar.js"></script>
</body>
</html>
</div>
